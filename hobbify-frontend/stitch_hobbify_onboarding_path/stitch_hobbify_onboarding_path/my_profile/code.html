<body class="bg-background text-on-surface min-h-screen pb-24">
<!-- TopAppBar -->
<header class="sticky top-0 w-full z-40 flex justify-between items-center px-margin-mobile py-4 bg-surface/80 dark:bg-surface-dim/80 backdrop-blur-xl">

</button>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile font-bold tracking-tight text-primary dark:text-primary-fixed">Hobbify</h1>
<button class="active:scale-95 transition-all text-on-surface-variant hover:opacity-80 transition-opacity">

</button>
</header>
<main class="px-margin-mobile mt-8 max-w-md mx-auto">
<!-- Profile Header Section -->
<section class="flex flex-col items-center mb-section-gap">
<div class="relative mb-6">
<div class="w-32 h-32 rounded-full overflow-hidden border-4 border-surface-container profile-card-shadow">
<img class="w-full h-full object-cover" data-alt="A professional and warm studio portrait of a young woman named Makenna with a gentle smile, set against a soft lavender and mint green abstract background. The lighting is bright and airy, reflecting a modern light-mode aesthetic. Her appearance is friendly and approachable, capturing the welcoming and community-focused essence of the Hobbify brand system." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCtJCiOo_HsVoZvZ83M4YGfnizBrGlqrSRhP3NP0xxYWdvWLiZb1Itc0gzCwJnSgmQ8c32-KAIvN1GBoF5c4egs90buqAyhOz81w1GTf514eYiDKkFUB3gYtq1PsSpoGtLBqQ67CfBhoaii9Wof-WdJT1aqADKuiFQqqPyYO6GvEtSctOkQ8M0Mv8tAmCCUsOXmlkISZeW5-PdkhosUJc__lmpIe4Bdt294F8DqdL34_GheJsvmcY5e35JV0sEEPjScLPiOhK_zLxfy"/>
</div>
<div class="absolute bottom-0 right-0 bg-secondary-container p-2 rounded-full shadow-md">
<span class="material-symbols-outlined text-on-secondary-container text-[20px]" data-icon="edit">edit</span>
</div>
</div>
<div class="text-center">
<h2 class="font-headline-md text-headline-md text-primary mb-1">Makenna Donin</h2>
<p class="font-body-md text-body-md text-on-surface-variant">makenna.d@example.com</p>
</div>
</section>
<!-- Stats Grid (Bento Style) -->
<section class="grid grid-cols-2 gap-4 mb-8">
<div class="bg-surface-container-low p-6 rounded-lg text-center profile-card-shadow">
<p class="font-headline-md text-headline-md text-secondary">12</p>
<p class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider">Hobbies</p>
</div>
<div class="bg-surface-container-low p-6 rounded-lg text-center profile-card-shadow">
<p class="font-headline-md text-headline-md text-secondary">48</p>
<p class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider">Sessions</p>
</div>
</section>
<!-- Settings Links List -->
<section class="space-y-4 mb-8">
<h3 class="font-label-md text-label-md text-on-surface-variant px-2 uppercase tracking-widest mb-2">Account Settings</h3>
<a class="flex items-center justify-between p-4 bg-surface-container-lowest rounded-lg profile-card-shadow active:scale-98 transition-transform" href="#">
<div class="flex items-center gap-4">
<div class="w-10 h-10 rounded-full bg-tertiary-fixed flex items-center justify-center">
<span class="material-symbols-outlined text-on-tertiary-fixed-variant" data-icon="lock">lock</span>
</div>
<span class="font-body-md text-body-md">Privacy Policy</span>
</div>
<span class="material-symbols-outlined text-outline" data-icon="chevron_right">chevron_right</span>
</a>
<a class="flex items-center justify-between p-4 bg-surface-container-lowest rounded-lg profile-card-shadow active:scale-98 transition-transform" href="#">
<div class="flex items-center gap-4">
<div class="w-10 h-10 rounded-full bg-secondary-fixed flex items-center justify-center">
<span class="material-symbols-outlined text-on-secondary-fixed-variant" data-icon="description">description</span>
</div>
<span class="font-body-md text-body-md">Terms of Service</span>
</div>
<span class="material-symbols-outlined text-outline" data-icon="chevron_right">chevron_right</span>
</a>
<a class="flex items-center justify-between p-4 bg-surface-container-lowest rounded-lg profile-card-shadow active:scale-98 transition-transform" href="#">
<div class="flex items-center gap-4">

</div>
<span class="font-body-md text-body-md">Notifications</span>
</div>
<span class="material-symbols-outlined text-outline" data-icon="chevron_right">chevron_right</span>
</a>
</section>

<section class="mt-12">
<button class="w-full py-4 px-6 bg-primary text-on-primary rounded-full font-label-md text-label-md flex items-center justify-center gap-2 active:scale-95 transition-transform shadow-lg">
<span class="material-symbols-outlined" data-icon="logout">logout</span>
                Log Out
            </button>
<p class="text-center mt-6 font-label-sm text-label-sm text-outline">Version 2.4.0 (Build 882)</p>

<span class="material-symbols-outlined" data-icon="favorite">favorite</span>
<span class="font-label-sm text-label-sm">My Hobbies</span>
</a>
<!-- Profile (Active) -->
<a class="flex flex-col items-center justify-center bg-secondary-container dark:bg-on-secondary-fixed-variant text-on-secondary-container dark:text-secondary-fixed rounded-full px-5 py-1.5 scale-95 active:scale-90 transition-transform duration-200" href="#">
<span class="material-symbols-outlined" data-icon="person" style="font-variation-settings: 'FILL' 1;">person</span>
<span class="font-label-sm text-label-sm">Profile</span>
</a>

<script>
        // Simple touch interaction feedback
        document.querySelectorAll('a, button').forEach(el => {
            el.addEventListener('touchstart', () => {
                el.style.opacity = '0.7';
            });
            el.addEventListener('touchend', () => {
                el.style.opacity = '1';
            });
        });
    </script>
